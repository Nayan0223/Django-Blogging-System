{% if page_obj.has_other_pages %}
<div class="pagination-container" style="display: flex; justify-content: center; margin-top: 2rem;">
    <div class="pagination" style="display: flex; gap: 0.5rem; align-items: center;">
        {% if page_obj.has_previous %}
        <a href="?page=1{% if request.GET.q %}&q={{ request.GET.q }}{% endif %}" class="btn-pagination"
            style="padding: 0.5rem 1rem; border: 1px solid #e2e8f0; border-radius: 6px; text-decoration: none; color: #64748b;">&laquo;
            First</a>
        <a href="?page={{ page_obj.previous_page_number }}{% if request.GET.q %}&q={{ request.GET.q }}{% endif %}"
            class="btn-pagination"
            style="padding: 0.5rem 1rem; border: 1px solid #e2e8f0; border-radius: 6px; text-decoration: none; color: #64748b;">Previous</a>
        {% endif %}

        <span class="current" style="padding: 0.5rem 1rem; font-weight: 600; color: #1e293b;">
            Page {{ page_obj.number }} of {{ page_obj.paginator.num_pages }}
        </span>

        {% if page_obj.has_next %}
        <a href="?page={{ page_obj.next_page_number }}{% if request.GET.q %}&q={{ request.GET.q }}{% endif %}"
            class="btn-pagination"
            style="padding: 0.5rem 1rem; border: 1px solid #e2e8f0; border-radius: 6px; text-decoration: none; color: #64748b;">Next</a>
        <a href="?page={{ page_obj.paginator.num_pages }}{% if request.GET.q %}&q={{ request.GET.q }}{% endif %}"
            class="btn-pagination"
            style="padding: 0.5rem 1rem; border: 1px solid #e2e8f0; border-radius: 6px; text-decoration: none; color: #64748b;">Last
            &raquo;</a>
        {% endif %}
    </div>
</div>
{% endif %}
